<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" role="img" aria-labelledby="title desc">
  <title id="title">Low-impact cardio animation</title>
  <desc id="desc">Animated step jack cardio movement.</desc>
  <style>
    .bg { fill: #10130d; }
    .panel { fill: #1a1f14; stroke: rgba(231,235,224,.16); stroke-width: 2; }
    .body { stroke: #f7f7f3; stroke-width: 20; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .accent { stroke: #b8f53d; }
    .left { transform-origin: 450px 250px; animation: left 1.2s ease-in-out infinite; }
    .right { transform-origin: 450px 250px; animation: right 1.2s ease-in-out infinite; }
    .pulse { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes left { 0%,100% { transform: rotate(-20deg); } 50% { transform: rotate(24deg); } }
    @keyframes right { 0%,100% { transform: rotate(22deg); } 50% { transform: rotate(-22deg); } }
    @keyframes pulse { 0%,100% { opacity: .25; transform: scale(.92); } 50% { opacity: .65; transform: scale(1); } }
  </style>
  <rect class="bg" width="900" height="540"/>
  <circle class="pulse" cx="450" cy="270" r="190" fill="#b8f53d" opacity=".25"/>
  <rect class="panel" x="64" y="54" width="772" height="432" rx="28"/>
  <circle cx="450" cy="132" r="34" fill="#f7f7f3"/>
  <path class="body" d="M450 172 L450 276"/>
  <path class="body left" d="M448 194 L352 250"/>
  <path class="body right" d="M452 194 L548 250"/>
  <path class="body left" d="M448 276 L340 386"/>
  <path class="body right" d="M452 276 L560 386"/>
  <path class="body accent" d="M242 390 C310 356 370 356 430 390"/>
  <path class="body accent" d="M470 390 C540 356 604 356 672 390"/>
  <rect x="92" y="86" width="198" height="38" rx="19" fill="#b8f53d" opacity=".16"/>
  <text x="114" y="111" fill="#b8f53d" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">STEP JACKS</text>
  <text x="92" y="440" fill="#aaaf9d" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Step out, reach up, keep landings quiet.</text>
</svg>
